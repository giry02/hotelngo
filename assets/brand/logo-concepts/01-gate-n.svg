<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">HotelNGo Gate N logo concept</title>
  <desc id="desc">A navy Hotel and Go wordmark connected by an orange lowercase n shaped like an open hotel gateway.</desc>
  <defs>
    <linearGradient id="gateSky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123E69"/>
      <stop offset="1" stop-color="#0B2948"/>
    </linearGradient>
  </defs>

  <!-- Standalone gate icon -->
  <rect x="72" y="70" width="190" height="190" rx="46" fill="url(#gateSky)"/>
  <path d="M119 218V132h34v18c15-17 35-26 59-26 39 0 62 25 62 67v27h-36v-29c0-21-11-31-31-31-27 0-52 19-52 48v12z" fill="#FF6B2C" transform="translate(-7 0)"/>
  <path d="M139 220h86" fill="none" stroke="#FFF8F1" stroke-width="10" stroke-linecap="round"/>
  <path d="m214 207 15 13-15 13" fill="none" stroke="#FFF8F1" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="320" y="213" fill="#123E69" font-family="Segoe UI, Arial, sans-serif" font-size="126" font-weight="750" letter-spacing="-5" textLength="318" lengthAdjust="spacingAndGlyphs">Hotel</text>
  <path d="M657 212V119h36v19c16-18 37-27 63-27 43 0 67 28 67 74v27h-38v-30c0-24-12-36-34-36-31 0-57 21-57 54v12z" fill="#FF6B2C"/>
  <text x="842" y="213" fill="#123E69" font-family="Segoe UI, Arial, sans-serif" font-size="126" font-weight="750" letter-spacing="-6" textLength="196" lengthAdjust="spacingAndGlyphs">Go</text>

  <text x="323" y="269" fill="#587087" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="650" letter-spacing="6">STAY · CONNECT · GO</text>
</svg>
