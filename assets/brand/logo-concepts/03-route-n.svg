<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">HotelNGo Route N logo concept</title>
  <desc id="desc">A dynamic navy wordmark where an orange n contains a white route that exits toward Go.</desc>
  <defs>
    <linearGradient id="routeOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF823D"/>
      <stop offset="1" stop-color="#F4511E"/>
    </linearGradient>
    <linearGradient id="routeNavy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A4778"/>
      <stop offset="1" stop-color="#102E50"/>
    </linearGradient>
  </defs>

  <!-- Standalone route icon -->
  <path d="M67 249V83h55v32c25-29 54-43 88-43 61 0 94 40 94 106v71h-57v-72c0-34-16-51-47-51-43 0-78 30-78 75v48z" fill="url(#routeOrange)"/>
  <path d="M103 231v-40c0-35 23-61 57-61h39c24 0 40 16 40 39v32" fill="none" stroke="#FFF9F3" stroke-width="12" stroke-linecap="round"/>
  <path d="m225 191 14 15 14-15" fill="none" stroke="#FFF9F3" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="337" y="213" fill="url(#routeNavy)" font-family="Segoe UI, Arial, sans-serif" font-size="124" font-weight="760" letter-spacing="-5" textLength="304" lengthAdjust="spacingAndGlyphs">Hotel</text>
  <path d="M660 212V119h36v20c16-19 37-28 63-28 43 0 67 28 67 74v27h-38v-31c0-24-12-36-34-36-31 0-57 21-57 54v13z" fill="url(#routeOrange)"/>
  <path d="M681 199v-18c0-24 16-42 39-42h27c17 0 28 11 28 27v23" fill="none" stroke="#FFF9F3" stroke-width="8" stroke-linecap="round"/>
  <path d="m766 181 9 10 9-10" fill="none" stroke="#FFF9F3" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="844" y="213" fill="url(#routeNavy)" font-family="Segoe UI, Arial, sans-serif" font-size="124" font-weight="760" letter-spacing="-6" textLength="196" lengthAdjust="spacingAndGlyphs">Go</text>

  <text x="340" y="272" fill="#60748A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="650" letter-spacing="6">STAY. BOOK. EXPLORE.</text>
</svg>
