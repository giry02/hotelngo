<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">HotelNGo Warm Portal N logo concept</title>
  <desc id="desc">A warm rounded HotelNGo logo with a sunset portal and an orange n as the welcoming doorway.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE6BE"/>
      <stop offset="1" stop-color="#FFF6E9"/>
    </linearGradient>
  </defs>

  <!-- Standalone warm portal icon -->
  <circle cx="166" cy="165" r="105" fill="url(#sunset)"/>
  <path d="M92 224V133h35v18c16-18 37-28 62-28 44 0 68 29 68 75v26h-39v-29c0-24-12-36-35-36-31 0-57 22-57 55v10z" fill="#FF6C32"/>
  <path d="M126 224v-14c0-28 20-50 48-50h20c24 0 43 19 43 43v21" fill="none" stroke="#14534F" stroke-width="13" stroke-linecap="round"/>
  <circle cx="183" cy="197" r="6" fill="#14534F"/>

  <!-- Wordmark -->
  <text x="320" y="212" fill="#14534F" font-family="Arial Rounded MT Bold, Segoe UI, Arial, sans-serif" font-size="121" font-weight="700" letter-spacing="-4" textLength="317" lengthAdjust="spacingAndGlyphs">Hotel</text>
  <path d="M657 211V121h37v19c16-18 37-27 62-27 43 0 67 28 67 73v25h-39v-28c0-24-11-36-34-36-30 0-56 21-56 53v11z" fill="#FF6C32"/>
  <text x="842" y="212" fill="#14534F" font-family="Arial Rounded MT Bold, Segoe UI, Arial, sans-serif" font-size="121" font-weight="700" letter-spacing="-5" textLength="196" lengthAdjust="spacingAndGlyphs">Go</text>

  <path d="M643 233h399" fill="none" stroke="#F1C98E" stroke-width="5" stroke-linecap="round"/>
  <text x="323" y="281" fill="#5C7874" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="650" letter-spacing="5">YOUR JOURNEY STARTS HERE</text>
</svg>
