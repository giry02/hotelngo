<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HotelNGo Logo Concepts</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", Arial, sans-serif; background: #edf2f5; color: #16344e; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 48px; }
    header { max-width: 1500px; margin: 0 auto 28px; }
    h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: -1px; }
    p { margin: 0; color: #62798c; }
    main { max-width: 1500px; margin: 0 auto; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; }
    article { overflow: hidden; border: 1px solid #dbe4e9; border-radius: 24px; background: #fff; box-shadow: 0 14px 35px rgb(25 56 78 / 9%); }
    article img { display: block; width: 100%; height: auto; padding: 20px; }
    .meta { display: flex; align-items: baseline; justify-content: space-between; gap: 18px; border-top: 1px solid #edf1f3; padding: 18px 24px 22px; }
    h2 { margin: 0; font-size: 18px; }
    span { color: #7b8e9d; font-size: 14px; }
    @media (max-width: 900px) { body { padding: 24px; } main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>HotelNGo — n as the connection</h1>
    <p>특수문자 없이 n을 게이트·브리지·경로·포털로 설계한 SVG 워드마크 4안</p>
  </header>
  <main>
    <article><img src="01-gate-n.svg" alt="Gate n logo"><div class="meta"><h2>01 · Gate n</h2><span>추천 · 명확하고 확장성 높음</span></div></article>
    <article><img src="02-bridge-n.svg" alt="Bridge n logo"><div class="meta"><h2>02 · Bridge n</h2><span>연결 플랫폼 강조</span></div></article>
    <article><img src="03-route-n.svg" alt="Route n logo"><div class="meta"><h2>03 · Route n</h2><span>예약에서 여행으로 이동</span></div></article>
    <article><img src="04-warm-portal-n.svg" alt="Warm portal n logo"><div class="meta"><h2>04 · Warm Portal n</h2><span>친근한 숙박 경험</span></div></article>
  </main>
</body>
</html>
