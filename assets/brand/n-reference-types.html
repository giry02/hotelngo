<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HotelnGo n 심볼 레퍼런스 9종</title>
  <style>
    @font-face{font-family:Pretendard;src:url("../fonts/PretendardVariable.woff2") format("woff2-variations");font-weight:100 900}
    @font-face{font-family:"HNG Sans";src:url("../fonts/LiberationSans-Bold.ttf") format("truetype");font-weight:700}
    *{box-sizing:border-box}body{margin:0;background:#f4f5f5;color:#181b1a;font-family:Pretendard,sans-serif}main{width:min(calc(100% - 40px),1160px);margin:auto;padding:48px 0 72px}header{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;margin-bottom:18px}header small{color:#2f6bff;font-size:11px;font-weight:780;letter-spacing:.14em}h1{margin:7px 0 0;font-size:28px;line-height:1.3}header p{max-width:550px;margin:0;color:#737b79;font-size:13px;line-height:1.65}.legend{display:flex;gap:8px;margin-bottom:24px}.legend span,.tone-label{display:inline-flex;align-items:center;gap:7px;color:#68706e;font-size:11px;font-weight:700}.swatch{width:12px;height:12px;border-radius:50%}.blue-swatch{background:#7d8fb8}.gray-swatch{background:#8e9693}.list{display:grid;gap:14px}.type-card{padding:22px;border:1px solid #e1e4e3;border-radius:16px;background:#fff}.type-head{display:flex;align-items:flex-start;justify-content:space-between;gap:25px;margin-bottom:15px}.type-no{color:#2f6bff;font-size:10px;font-weight:800;letter-spacing:.12em}.type-head h2{margin:5px 0 0;font-size:18px}.type-head p{max-width:510px;margin:0;color:#777f7d;font-size:12px;line-height:1.55}.tones{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tone{padding:14px;border:1px solid #e9ebea;border-radius:12px;background:#fafbfb}.tone-blue{color:#7d8fb8}.tone-gray{color:#8e9693}.tone-label{color:#717977}.large-stage{display:grid;place-items:center;height:150px;margin:8px 0 10px;background:#fff;border-radius:9px}.large-stage svg{width:min(300px,92%);height:auto}.actual{display:flex;align-items:center;height:57px;padding:0 14px;border:1px solid #e7eae9;border-radius:9px;background:#fff}.actual svg{width:126px;height:auto}.actual em{margin-left:auto;color:#959c9a;font-size:9px;font-style:normal}.logo .word{font-family:"HNG Sans","Liberation Sans",Arial,sans-serif;font-weight:700;letter-spacing:-2.8px;fill:#181b1a}.logo .accent{fill:currentColor;stroke:currentColor}.logo .accent-fill{fill:currentColor}.logo .accent-stroke{fill:none;stroke:currentColor}.logo .pin{fill:#2f6bff}.logo .pin-hole{fill:#fff}footer{margin-top:18px;color:#8b9290;font-size:11px}@media(max-width:760px){main{padding-top:32px}header,.type-head{display:block}header p,.type-head p{margin-top:10px}.tones{grid-template-columns:1fr}.large-stage{height:135px}}
  </style>
</head>
<body>
  <main>
    <header><div><small>HOTELNGO · N SYMBOL REFERENCE STUDY</small><h1>첨부 레퍼런스 기반 n 심볼 9종</h1></div><p>첨부 이미지의 조형 원리만 재해석했습니다. 각 타입은 큰 로고와 실제 헤더 폭 126px로 표시하며, 형태는 같고 강조색만 두 가지로 구분합니다.</p></header>
    <div class="legend"><span><i class="swatch blue-swatch"></i>기본 블루그레이 #7D8FB8</span><span><i class="swatch gray-swatch"></i>뉴트럴 그레이 #8E9693</span></div>
    <section class="list" id="symbol-list"></section>
    <footer>메인 로고는 변경하지 않았습니다. 선택한 타입과 색상을 알려주면 정본 SVG에 맞춰 자간과 위치를 최종 보정할 수 있습니다.</footer>
  </main>
  <script>
    const types = [
      {no:"01",name:"Loop Link",desc:"하나의 굵은 선이 안팎으로 순환하며 n과 연결 게이트를 동시에 연상시키는 형태입니다.",shape:`<path class="accent-stroke" d="M146 59V42c0-8 5-13 12-13s12 5 12 13v9c0 6-3.5 9-7.5 9s-7.5-3-7.5-9V42" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>`},
      {no:"02",name:"Twin Flow",desc:"두 개의 부드러운 리본이 교차해 이동과 연결을 표현하는 유기적인 심볼입니다.",shape:`<path class="accent-stroke" d="M149 56c-5-10-5-19 0-27 3-5 8-4 12 2l15 24" stroke-width="8" stroke-linecap="round"/><path class="accent-stroke" d="M174 30c5 10 5 19 0 27-3 5-8 4-12-2l-14-24" stroke-width="8" stroke-linecap="round" opacity=".68"/>`},
      {no:"03",name:"Notch Arch",desc:"정돈된 아치의 시작점에 작은 절개를 넣어 n의 어깨와 게이트를 함께 표현했습니다.",shape:`<path class="accent-fill" fill-rule="evenodd" d="M144 59V36l8 6c2-8 7-12 14-12 9 0 14 6 14 15v14h-8V46c0-6-3-9-8-9s-8 4-8 10v12Z"/>`},
      {no:"04",name:"Folded Gate",desc:"접힌 왼쪽 판과 둥근 오른쪽 입구를 조합해 간결한 공간감을 만든 형태입니다.",shape:`<path class="accent-fill" d="M144 31h10v28h-10Z" opacity=".62"/><path class="accent-fill" fill-rule="evenodd" d="M153 31h10c10 0 17 7 17 17v11h-9V48c0-6-3-9-9-9h-9Z"/><path class="accent-fill" d="m144 52 10 7V48Z" opacity=".78"/>`},
      {no:"05",name:"Skyline Link",desc:"호텔과 도시의 수직선을 연결해 n의 리듬을 만드는 모듈형 심볼입니다.",shape:`<rect class="accent-fill" x="144" y="31" width="5" height="28" rx="1"/><rect class="accent-fill" x="152" y="35" width="5" height="24" rx="1" opacity=".9"/><rect class="accent-fill" x="160" y="40" width="5" height="19" rx="1" opacity=".78"/><rect class="accent-fill" x="168" y="35" width="5" height="24" rx="1" opacity=".9"/><rect class="accent-fill" x="176" y="31" width="5" height="28" rx="1"/>`},
      {no:"06",name:"Prism Portal",desc:"앞면과 측면이 겹치는 프리즘 구조로 입구의 깊이와 방향성을 표현했습니다.",shape:`<path class="accent-fill" d="M144 31h10v28h-10Z" opacity=".72"/><path class="accent-fill" fill-rule="evenodd" d="M153 31h10c10 0 17 7 17 17v11h-10V48c0-5-3-8-8-8h-9Z"/><path class="accent-fill" d="m153 31 10 9h-10Z" opacity=".48"/>`},
      {no:"07",name:"Diagonal N",desc:"두 개의 기둥을 대각선으로 절개해 N의 방향성과 문이 열리는 동작을 담았습니다.",shape:`<path class="accent-fill" d="M144 59V30l18 18v11Z"/><path class="accent-fill" d="M179 30v29l-18-18V30Z" opacity=".8"/>`},
      {no:"08",name:"Architectural Door",desc:"서로 다른 깊이의 문틀과 열린 판을 조합한 가장 건축적인 게이트 심볼입니다.",shape:`<path class="accent-fill" d="M151 59V31l17 8v20h-7V43l-3-2v18Z"/><path class="accent-fill" d="M143 59V41l7-5v23Z" opacity=".72"/><path class="accent-fill" d="m168 52 8 5v2h-8Z" opacity=".42"/>`},
      {no:"09",name:"Reference Split Gate",desc:"첨부 이미지 상단 심볼에서 검출한 두 개의 독립 윤곽을 같은 비율로 축소한 형태입니다. 임의의 선이나 연결부를 추가하지 않았습니다.",shape:`<path class="accent-fill" d="M147.51 31.89 149.62 32.24 151.55 34.54 151.73 46.77 152.08 48.01 154.19 50.49 158.40 51.38 161.21 50.14 162.79 47.48 163.14 44.11 164.90 42.16 167.71 41.81 169.99 43.41 170.52 46.06 169.64 50.67 168.06 53.51 165.07 56.52 161.21 58.47 157 59 152.43 58.11 149.97 56.87 147.16 54.39 144.35 48.72 144 35.43 145.23 32.77Z"/><path class="accent-fill" d="M164.72 31 168.76 31 172.45 32.06 175.61 34.19 178.77 38.44 180 43.05 180 55.81 179.47 57.23 177.89 58.65 174.56 58.65 172.62 56.52 172.45 43.05 171.04 40.22 169.64 39.15 165.42 38.62 162.61 40.22 161.21 42.87 160.86 45.89 158.93 47.84 155.59 47.84 153.48 45.18 154.01 40.22 156.47 35.61 160.16 32.59Z"/>`}
    ];

    const logo = shape => `<svg class="logo" viewBox="0 0 300 86" role="img" aria-label="HotelnGo n 심볼 로고"><g transform="translate(3)"><text class="word" x="0" y="59" font-size="59">Hotel</text>${shape}<text class="word" x="187" y="59" font-size="56">g</text><g transform="translate(13)"><path class="pin" d="M247 6c-20.5 0-35 13.7-35 33.5 0 16.5 11.3 28.7 35 45.5 23.7-16.8 35-29 35-45.5C282 19.7 267.5 6 247 6Z"/><circle class="pin-hole" cx="247" cy="38.5" r="14"/><path class="pin" d="m239 39 17-8-6.2 17.6-4.5-7Z"/></g></g></svg>`;
    const tone = (kind,label,shape) => `<section class="tone tone-${kind}"><span class="tone-label"><i class="swatch ${kind==='blue'?'blue-swatch':'gray-swatch'}"></i>${label}</span><div class="large-stage">${logo(shape)}</div><div class="actual">${logo(shape)}<em>실제 헤더 126px</em></div></section>`;
    document.querySelector("#symbol-list").innerHTML = types.map(type => `<article class="type-card" id="type-${type.no}"><div class="type-head"><div><span class="type-no">TYPE ${type.no}</span><h2>${type.name}</h2></div><p>${type.desc}</p></div><div class="tones">${tone("blue","기본 블루그레이",type.shape)}${tone("gray","뉴트럴 그레이",type.shape)}</div></article>`).join("");
  </script>
</body>
</html>
