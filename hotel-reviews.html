<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Hyatt Regency Danang Resort 투숙객 후기">
  <title>Hyatt Regency Danang Resort 후기 · HotelnGo</title>
  <link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png" type="image/png">
  <link rel="stylesheet" href="styles/tokens.css?v=10">
  <link rel="stylesheet" href="styles/main.css?v=27">
  <link rel="stylesheet" href="styles/pages.css?v=14">
  <script src="scripts/site-shell.js?v=11" defer></script>
  <script src="scripts/mock-api.js?v=7" defer></script>
  <script src="scripts/platform-flows.js?v=7" defer></script>
  <script src="scripts/auth.js?v=4" defer></script>
  <script src="scripts/main.js?v=13" defer></script>
  <script src="scripts/hotel-content.js?v=5" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">본문으로 바로가기</a>
  <div data-site-header data-active="hotels"></div>
  <main class="page-main" id="main-content">
    <div class="shell review-page-head">
      <nav class="page-breadcrumb" aria-label="현재 위치"><a href="index.html">홈</a><span><a href="hotels.html">호텔</a></span><span><a href="hotel-detail.html">Hyatt Regency Danang Resort</a></span><span>후기</span></nav>
      <span class="page-eyebrow">VERIFIED STAY REVIEWS</span>
      <h1 class="page-title">Hyatt Regency Danang Resort 후기</h1>
      <p class="page-description">실제 예약이 확인된 후기와 객실·여행 유형별 평가를 확인하세요.</p>
    </div>
    <div class="shell">
      <div data-hotel-review-overview><div class="empty-state"><strong>후기 요약을 불러오는 중입니다.</strong></div></div>
      <div class="review-filterbar" aria-label="후기 필터">
        <label>여행 유형<select data-review-filter="traveler"><option>전체</option><option>가족</option><option>커플</option><option>1인 여행</option></select></label>
        <label>객실 유형<select data-review-filter="room"><option>전체</option><option>디럭스 오션뷰</option><option>리젠시 클럽 오션</option><option>2 베드룸 레지던스</option></select></label>
        <label>정렬<select data-review-filter="sort"><option value="recent">최근 숙박순</option><option value="high">평점 높은순</option><option value="helpful">도움이 된 순</option></select></label>
      </div>
      <div class="review-list-head"><h2>투숙객 후기</h2><span data-review-result-count>후기 불러오는 중</span></div>
      <div class="hotel-review-list" data-hotel-review-list><div class="empty-state"><strong>후기를 불러오는 중입니다.</strong></div></div>
    </div>
  </main>
  <div data-site-footer></div>
  <div class="toast" role="status" aria-live="polite" data-toast></div>
  <div data-site-mobile-nav data-active="hotels"></div>
</body>
</html>
