<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>객실 공개정보 편집 · HotelnGo</title><link rel="stylesheet" href="styles/backoffice.css?v=15"><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/hotel-auth.js?v=1" defer></script><script src="scripts/backoffice-shell.js?v=13" defer></script><script src="scripts/hotel-console.js?v=2" defer></script></head><body data-app="hotel" data-section="rooms" data-hotel-auth-required><div class="bo-app"><div data-backoffice-shell></div><main class="bo-main"><header class="bo-page-head"><div><h1><span data-room-name>객실</span> 공개정보</h1><p>PMS 매핑 <strong data-room-mapping></strong>에 연결된 사진과 판매 설명입니다.</p></div><a class="bo-button" href="hotel-rooms.html">객실 목록</a></header><div class="bo-notice"><span><b>PMS 읽기 전용</b> · 객실유형 ID, 날짜별 요금과 가용수량은 수정할 수 없습니다. 여기서는 B2C 표현만 보완합니다.</span></div><div class="bo-detail-grid"><form class="bo-card bo-application-form" data-hotel-room-form><div class="bo-card-head"><h2>객실 설명</h2></div><div class="bo-form-grid"><label class="bo-field full"><span>객실명 · PMS 표시값</span><input name="name" readonly></label><label class="bo-field"><span>면적(㎡)</span><input required type="number" name="sizeM2"></label><label class="bo-field"><span>침대</span><input required name="bed"></label><label class="bo-field"><span>정원</span><input required name="occupancy"></label><label class="bo-field"><span>전망</span><input required name="view"></label><label class="bo-field full"><span>욕실</span><input required name="bathroom"></label><label class="bo-field full"><span>객실 편의시설 · 쉼표 구분</span><textarea name="amenities"></textarea></label></div><div class="bo-actions"><button class="bo-button primary" type="submit">객실 공개정보 저장</button></div></form><section class="bo-card"><div class="bo-card-head"><div><h2>객실 사진 여러 장</h2><span>대표·침실·욕실·전망·편의시설을 구분해 등록하세요.</span></div><button class="bo
