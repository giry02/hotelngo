<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>호텔 등록·소유권 요청 · HotelnGo</title><link rel="stylesheet" href="styles/backoffice.css?v=15"><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/hotel-auth.js?v=1" defer></script></head><body><main class="bo-auth-page partner-signup-page"><section class="bo-auth-visual"><img src="assets/brand/official/hotelngo-logo-primary.png" alt="HotelnGo"><div><h1>호텔 공개 페이지의<br>관리 권한을 요청하세요</h1><p>Hotel_PMS 사용 여부와 관계없이 호텔 소유권·운영권을 확인한 뒤 공개 콘텐츠 관리 권한을 부여합니다.</p></div><small>ACCOUNT → OWNERSHIP → MAPPING → PUBLICATION</small></section><section class="bo-auth-panel"><div class="bo-auth-card"><a class="bo-auth-brand" href="hotel-login.html"><img src="assets/brand/official/hotelngo-logo-primary.png" alt="HotelnGo"><span>호텔 등록</span></a><span class="bo-auth-realm">HOTEL OWNERSHIP</span><h1>호텔과 담당자 정보</h1><p>PMS의 호텔·직원 계정을 가져오지 않으며, 승인 후 필요한 객실유형만 식별자로 연결합니다.</p><form class="bo-auth-form" data-hotel-signup-form><label>호텔명<input required name="hotelName" autocomplete="organization"></label><div class="bo-form-grid"><label class="bo-field"><span>국가</span><input required name="country" value="베트남"></label><label class="bo-field"><span>도시</span><input required name="city" value="다낭"></label></div><label>PMS Tenant ID <small>모르면 비워 두세요</small><input name="tenantId" placeholder="tenant_demo_danang"></label><label>소유권·운영권 증빙 설명<textarea required name="proof" placeholder="법인명, 공식 도메인 이메일, 영업허가 또는 위임 관계"></textarea></label><div class="bo-form-grid"><label class="bo-field"><span>담당자 이름</span><input required name="name"></label><label class="bo-field"><span>업무 이메일</span><input required type="email" name="email"></label></div><label>비밀번호<input required type="password" minlength="8" name="password"></label><label class="bo-check-row"><input required type="checkbox"> 호텔 소유권 확인과 콘텐츠 운영 약관에 동의합니다.</label><p class="bo-auth-feedback" data-hotel-feedback role="status" hidden></p><button class="bo-button primary" type="submit">소유권 확인 요청</button></form><div class="bo-auth-note">골프장·음식점·차량·마사지·투어 업체는 <a href="partner-signup.html"><strong>액티비티 파트너센터</strong></a>에서 가입합니다.</div></div></section></main></body></html>
