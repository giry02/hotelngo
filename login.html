<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="HotelnGo 로그인">
  <title>로그인 · HotelnGo</title>
  <link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png">
  <link rel="stylesheet" href="styles/tokens.css?v=10">
  <link rel="stylesheet" href="styles/main.css?v=29">
  <link rel="stylesheet" href="styles/pages.css?v=16">
  <script src="scripts/site-shell.js?v=12" defer></script>
  <script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script>
  <script src="scripts/auth.js?v=4" defer></script>
  <script src="scripts/main.js?v=13" defer></script>
  <script src="scripts/pages.js?v=8" defer></script>
  <script src="scripts/commerce.js?v=3" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">본문으로 바로가기</a>
  <div data-site-header></div>
  <main id="main-content">
    <section class="auth-split">
      <div class="auth-visual">
        <div><small>STAY HERE. GO ANYWHERE.</small><h2>저장한 장면에서<br>다시 여행을 시작하세요</h2></div>
      </div>
      <div class="auth-side">
        <div class="auth-card">
          <span class="page-eyebrow">WELCOME BACK</span>
          <h1>로그인</h1>
          <p>로그인하면 내 여행, 저장한 장소와 예약·주문을 이어서 확인할 수 있습니다.</p>
          <form class="form-stack" data-login-form>
            <label><span>이메일</span><input required name="email" type="email" value="demo@hotelngo.test" placeholder="name@example.com" autocomplete="email"></label>
            <label><span>비밀번호</span><input required name="password" type="password" value="Hotelngo!2026" minlength="8" placeholder="비밀번호" autocomplete="current-password"></label>
            <p class="auth-feedback" data-auth-feedback role="status" hidden></p>
            <button class="ui-button primary" type="submit">로그인</button>
            <a class="ui-button auth-join" href="signup.html">회원가입</a>
          </form>
          <nav class="auth-links"><a href="password-reset.html">비밀번호 찾기</a><a href="bookings.html">비회원 예약 조회</a></nav>
          <div class="demo-account"><div><strong>화면 검증용 데모 계정</strong><span>demo@hotelngo.test · Hotelngo!2026</span></div><button class="ui-button soft" type="button" data-fill-demo>다시 채우기</button></div>
          <div class="prototype-note">JSON Mock 계정과 브라우저 세션으로 동작합니다. 실제 서비스에서는 비밀번호를 서버 인증 영역에서만 검증하고 소셜 로그인은 OAuth 공급자 계약 후 별도로 연결합니다.</div>
        </div>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
  <div data-site-mobile-nav data-active="my"></div>
</body>
</html>
