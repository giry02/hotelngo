<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>업체 입점 신청 · HotelnGo 파트너</title><link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png"><link rel="stylesheet" href="styles/backoffice.css?v=14"><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/backoffice-shell.js?v=13" defer></script><script src="scripts/partner-auth.js?v=4" defer></script><script src="scripts/partner-portal.js?v=2" defer></script></head><body data-app="partner" data-section="application" data-partner-auth-required><div class="bo-app"><div data-backoffice-shell></div><main class="bo-main"><header class="bo-page-head"><div><h1>업체 입점 신청</h1><p><span data-partner-business-type></span> 사업자·장소·증빙·정산 정보를 제출합니다.</p></div><div class="bo-actions"><a class="bo-button" href="partner-claim.html">기존 업체 인수</a><a class="bo-button" href="partner-application-status.html">신청 상태</a></div></header><div class="bo-notice"><span><b>중복 생성 방지</b> · 이미 HotelnGo에 등록된 업체라면 새로 만들지 말고 소유권 인수를 요청하세요.</span><span class="bo-status warn">DRAFT</span></div><form class="bo-application-form" data-partner-application-form><section class="bo-card"><div class="bo-card-head"><h2>1. 사업자·담당자</h2><span class="bo-status muted">필수</span></div><div class="bo-form-grid"><label class="bo-field"><span>법적 업체명</span><input required name="legalName"></label><label class="bo-field"><span>사업자 등록번호</span><input required name="registrationNumber"></label><label class="bo-field"><span>대표자</span><input required name="representativeName"></label><label class="bo-field"><span>담당자</span><input required name="contactName"></label><label class="bo-field"><span>업무 이메일</span><input required name="email" type="email"></label><label class="bo-field"><span>업무 연락처</span><input required name="phone"></label></div></section><section class="bo-card"><div class="bo-card-head"><h2>2. 업체·지점</h2></div><div class="bo-form-grid"><label class="bo-field"><span>국가</span><select required name="country"><option value="">선택</option><option value="VN">베트남</option><option value="TH">태국</option><option value="JP">일본</option><option value="ID">인도네시아</option></select></label><label class="bo-field"><span>도시</span><input required name="city"></label><label class="bo-field full"><span>주소</span><input required name="address"></label><label class="bo-field"><span>공식 전화</span><input required name="officialPhone"></label><label class="bo-field"><span>공식 웹사이트·SNS</span><input required name="officialChannel" type="url" placeholder="https://"></label><label class="bo-field full"><span>업체 소개</span><textarea required name="description"></textarea></label></div></section><section class="bo-card"><div class="bo-card-head"><h2>3. 증빙·정산</h2><span class="bo-status warn">Mock 파일명만 기록</span></div><div class="bo-form-grid"><label class="bo-field"><span>사업자·영업 증빙</span><input required name="businessDocument" data-document-reference placeholder="business-license.pdf"></label><label class="bo-field"><span>계좌 증빙</span><input required name="settlementDocument" data-document-reference placeholder="settlement-account.pdf"></label><label class="bo-field"><span>정산 통화</span><select required name="settlementCurrency"><option>USD</option><option>VND</option><option>THB</option><option>JPY</option></select></label><label class="bo-field"><span>예금주</span><input required name="accountHolder"></label><label class="bo-field full"><span>계좌 참조</span><input required name="accountReference" placeholder="Mock에서는 원문 계좌를 외부로 전송하지 않습니다."></label></div></section><section class="bo-card"><div class="bo-card-head"><h2>4. 계약·제출</h2></div><label class="bo-check-row"><input required type="checkbox" name="feeConsent" value="accepted"> 업종별 수수료와 정산 주기에 동의합니다.</label><label class="bo-check-row"><input required type="checkbox" name="contentConsent" value="accepted"> 제출 정보의 정확성 및 미디어 사용 권한을 확인했습니다.</label><p class="bo-auth-feedback" data-partner-feedback role="status" hidden></p><div class="bo-actions"><button class="bo-button primary" type="submit">입점 심사 제출</button></div></section></form></main></div></body></html>
