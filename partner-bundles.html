<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>호텔 결합 혜택 · HotelnGo 파트너</title><link rel="stylesheet" href="styles/backoffice.css?v=15"><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/partner-auth.js?v=4" defer></script><script src="scripts/backoffice-shell.js?v=13" defer></script><script src="scripts/partner-catalog.js?v=3" defer></script></head><body data-app="partner" data-section="bundles" data-partner-auth-required data-partner-approved-required><div class="bo-app"><div data-backoffice-shell></div><main class="bo-main"><header class="bo-page-head"><div><h1>호텔 결합 혜택</h1><p>호텔 재고와 파트너 재고를 합치지 않고, 일정 조건을 만족할 때 할인·무료 옵션만 연결합니다.</p></div></header><div class="bo-notice"><span><b>정산 분리</b> · 원가, 파트너 할인 부담, 플랫폼 부담, 수수료와 최종 지급액을 주문 항목별로 기록합니다.</span></div><form class="bo-card bo-application-form" data-bundle-form><div class="bo-form-grid"><label class="bo-field full"><span>혜택명</span><input required name="name" placeholder="제휴 호텔 + Ocean 18홀"></label><label class="bo-field"><span>적용 조건</span><input required name="condition" placeholder="같은 여행 일정에 제휴 호텔 포함"></label><label class="bo-field"><span>고객 혜택</span><input required name="benefit" placeholder="1인 18,000원 할인"></label><label class="bo-field full"><span>비용 부담·정산</span><input required name="settlement" placeholder="파트너 9,000원 · 플랫폼 9,000원"></label></div><div class="bo-actions"><button class="bo-button primary" type="submit">결합 혜택 저장</button></div></form><section class="bo-card"><div class="bo-table-wrap"><table class="bo-table"><thead><tr><th>혜택</th><th>조건</th><th>고객 혜택</th><th>정산 기준</th><th>상태</th></tr></thead><tbody data-partner-bundle-list></tbody></table></div></section></main></div></body></html>
