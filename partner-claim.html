<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>업체 페이지 인수 · HotelnGo 파트너</title><link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png"><link rel="stylesheet" href="styles/backoffice.css?v=14"><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/backoffice-shell.js?v=13" defer></script><script src="scripts/partner-auth.js?v=4" defer></script><script src="scripts/partner-portal.js?v=2" defer></script></head><body data-app="partner" data-section="claim" data-partner-auth-required><div class="bo-app"><div data-backoffice-shell></div><main class="bo-main"><header class="bo-page-head"><div><h1>기존 업체 페이지 인수</h1><p>플랫폼이 선등록한 Provider·Place를 검색하고 실제 운영 권한을 요청합니다.</p></div><div class="bo-actions"><a class="bo-button" href="partner-application.html">새 업체 신청</a></div></header><div class="bo-notice"><span><b>기존 관계 유지</b> · 승인 시 새 페이지를 만들지 않고 리뷰·저장·스토리·랜드마크 연결을 유지합니다.</span><span class="bo-status">CLAIM</span></div><div class="bo-grid"><section class="bo-card"><div class="bo-card-head"><h2>인수 가능한 업체</h2></div><div class="bo-claim-list" data-claim-provider-list></div></section><section class="bo-card"><div class="bo-card-head"><h2>소유권 요청</h2></div><form class="bo-auth-form" data-partner-claim-form><input type="hidden" name="providerId"><div class="bo-selected-provider"><small>선택 업체</small><strong data-selected-provider>왼쪽에서 업체를 선택하세요</strong></div><label>증빙 유형<select required name="evidenceType"><option value="">선택</option><option>사업자·영업 증빙</option><option>법인·브랜드 권한</option><option>임대차·운영 계약</option></select></label><label>공식 채널 확인<select required name="verificationChannel"><option value="">선택</option><option>공식 이메일</option><option>공식 전화 OTP</option><option>공식 SNS</option></select></label><label>요청 사유<textarea required name="reason"></textarea></label><p class="bo-auth-feedback" data-partner-feedback
