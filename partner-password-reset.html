<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>파트너 비밀번호 재설정 · HotelnGo</title>
  <link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png">
  <link rel="stylesheet" href="styles/backoffice.css?v=15">
  <script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script>
  <script src="scripts/partner-auth.js?v=4" defer></script>
</head>
<body>
  <main class="bo-auth-page">
    <section class="bo-auth-visual"><img src="assets/brand/official/hotelngo-logo-primary.png" alt="HotelnGo"><div><h1>업체 계정의 보안도<br>서비스 경계 안에서 관리합니다</h1><p>이 화면은 파트너 계정 전용 Mock 복구 흐름입니다. B2C·관리자·PMS 비밀번호에는 영향을 주지 않습니다.</p></div><small>HOTELNGO_PARTNER · PASSWORD RECOVERY</small></section>
    <section class="bo-auth-panel"><div class="bo-auth-card"><a class="bo-auth-brand" href="partner-login.html"><img src="assets/brand/official/hotelngo-logo-primary.png" alt="HotelnGo"><span>파트너센터</span></a><span class="bo-auth-realm">PASSWORD RESET</span><h1>비밀번호 재설정</h1><p>프로토타입에서는 이메일 링크 발송 대신 등록된 업무 이메일을 확인해 브라우저 Mock 계정을 갱신합니다.</p><form class="bo-auth-form" data-partner-reset-form><label>업무 이메일<input required name="email" type="email" autocomplete="username"></label><label>새 비밀번호<input required name="password" type="password" minlength="8" autocomplete="new-password"></label><label>새 비밀번호 확인<input required name="passwordConfirmation" type="password" minlength="8" autocomplete="new-password"></label><p class="bo-auth-feedback" data-partner-feedback role="status" hidden></p><button class="bo-button primary" type="submit">비밀번호 변경</button></form><div class="bo-auth-note">실서비스에서는 일회용 토큰, 만료 시간, 재사용 차단, 변경 알림과 감사 로그가 필요합니다.</div><nav class="bo-auth-links"><a href="partner-login.html">로그인으로 돌아가기</a><a href="partner-signup.html">파트너 회원가입</a></nav></div></section>
  </main>
</body>
</html>
