<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

<body data-app="partner" data-section="products" data-partner-auth-required data-partner-approved-required>
  <div class="bo-app">
    <div data-backoffice-shell></div>
    <main class="bo-main">
      <header class="bo-page-head">
        <div>
          <h1>업종별 상품</h1>
          <p>고객이 비교하고 선택할 판매 단위와 가격·포함사항·취소 정책을 관리합니다.</p>
        </div>
        <div class="bo-actions">
          <a class="bo-button" href="partner-resources.html">자원 관리</a>
          <a class="bo-button" href="partner-schedules.html">슬롯 관리</a>
          <a class="bo-button primary" href="partner-product-create.html">상품 등록</a>
        </div>
      </header>
      <div class="bo-notice">
        <span><b>상품 ≠ 사업장</b> · 골프장은 코스·홀·포함 서비스, 차량은 차종·기사·시간, 음식점은 메뉴·좌석, 스파는 프로그램·룸·시간을 각각 상품으로 등록합니다.</span>
        <span class="bo-status">업종별 모델</span>
      </div>
      <section class="bo-card">
        <div class="bo-card-head"><h2>판매 상품</h2><span>가격 고정·최저가·추후 협의 지원</span></div>

            <thead><tr><th>상품</th><th>유형</th><th>판매가</th><th>예약 자원</th><th>포함 서비스</th><th>상태</th><th>작업</th></tr></thead>
            <tbody data-partner-product-list></tbody>
          </table>
        </div>
        <p class="bo-empty" data-partner-product-empty hidden>등록된 상품이 없습니다. 상품을 먼저 등록해 주세요.</p>
      </section>
