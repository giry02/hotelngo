<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="HotelnGo 비밀번호 재설정 확인"><title>새 비밀번호 설정 · HotelnGo</title><link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png"><link rel="stylesheet" href="styles/tokens.css?v=10"><link rel="stylesheet" href="styles/main.css?v=29"><link rel="stylesheet" href="styles/pages.css?v=16"><script src="scripts/site-shell.js?v=12" defer></script><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/auth.js?v=4" defer></script><script src="scripts/main.js?v=13" defer></script><script src="scripts/pages.js?v=8" defer></script></head><body><a class="skip-link" href="#main-content">본문으로 바로가기</a><div data-site-header></div><main id="main-content"><section class="auth-wrap"><div class="auth-card"><span class="page-eyebrow">ACCOUNT RECOVERY</span><h1>새 비밀번호 설정</h1><p>발급받은 Mock 인증번호와 새 비밀번호를 입력하세요.</p><form class="form-stack" data-password-reset-confirm><label><span>가입 이메일</span><input required name="email" type="email" autocomplete="email"></label><label><span>인증번호</span><input required name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6자리"></label><label><span>새 비밀번호</span><input required name="password" type="password" minlength="8" autocomplete="new-password"></label><label><span>새 비밀번호 확인</span><input required name="passwordConfirmation" type="password" minlength="8" autocomplete="new-password"></label><p class="auth-feedback" data-auth-feedback role="status" hidden></p><button class="ui-button primary" type="submit">비밀번호 변경</button></form><nav class="auth-links"><a href="password-reset.html">인증번호 다시 받기</a><a href="login.html">로그인</a></nav><div class="prototype-note">Mock 인증번호는 628314입니다. HotelnGo 계정의 브라우저 저장 비밀번호만 변경하며 PMS 계정에는 영향을 주지 않습니다.</div></div></section></main><div data-site-footer></div><div data-site-
