<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="HotelnGo 회원가입"><title>회원가입 · HotelnGo</title><link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png"><link rel="stylesheet" href="styles/tokens.css?v=10"><link rel="stylesheet" href="styles/main.css?v=28"><link rel="stylesheet" href="styles/pages.css?v=15"><script src="scripts/site-shell.js?v=12" defer></script><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/auth.js?v=4" defer></script><script src="scripts/main.js?v=13" defer></script><script src="scripts/pages.js?v=8" defer></script><script src="scripts/commerce.js?v=3" defer></script></head>
<body><a class="skip-link" href="#main-content">본문으로 바로가기</a><div data-site-header></div><main id="main-content"><section class="auth-split"><div class="auth-visual"><div><small>COLLECT MOMENTS, BUILD A JOURNEY</small><h2>마음이 머문 장면을<br>한 편의 여행으로</h2></div></div><div class="auth-side"><div class="auth-card"><span class="page-eyebrow">JOIN HOTELNGO</span><h1>회원가입</h1><p>Hotel_PMS 고객과 분리된 HotelnGo 여행자 계정을 만듭니다.</p><form class="form-stack" data-signup-form><label><span>이름</span><input required name="name" autocomplete="name" placeholder="이름"></label><label><span>이메일</span><input required name="email" type="email" autocomplete="email" placeholder="name@example.com"></label><div class="form-grid"><label><span>거주 국가</span><select name="residenceCountry" required><option value="KR">대한민국</option><option value="JP">일본</option><option value="US">미국</option><option value="SG">싱가포르</option><option value="OTHER">기타</option></select></label><label><span>국적</span><select name="nationality" required><option value="KR">대한민국</option><option value="JP">일본</option><option value="US">미국</option><option value="SG">싱가포르</option><option value="OTHER">기타</option></select></label></div><label><span>비밀번호</span><input required name="password" type="password" minlength="8" autocomplete="new-password" placeholder="8자 이상"></label><label class="check-row"><input type="checkbox" required> 이용약관과 개인정보처리방침에 동의합니다. (필수)</label><label class="check-row"><input type="checkbox"> 여행 추천과 혜택 알림 수신에 동의합니다. (선택)</label><p class="auth-feedback" data-auth-feedback role="status" hidden></p><button class="ui-button primary" type="submit">가입하고 시작하기</button></form><nav class="auth-links"><span>이미 계정이 있나요?</span><a href="login.html">로그인</a></nav><div class="prototype-note">PMS의 직원·고객 로그인 정보는 가져오지 않습니다. 이 Mock에서는 입력한 계정과 기본 프로필을 브라우저에만 저장합니다.</div></div></div></section></main><div data-site-footer></div><div data-site-mobile-nav data-active="my"></div></body></html>
