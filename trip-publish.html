<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>일정 공개·공유 · HotelnGo</title><link rel="icon" href="assets/brand/official/hotelngo-symbol-primary.png"><link rel="stylesheet" href="styles/tokens.css?v=10"><link rel="stylesheet" href="styles/main.css?v=28"><link rel="stylesheet" href="styles/pages.css?v=15"><script src="scripts/site-shell.js?v=12" defer></script><script src="scripts/mock-api.js?v=7" defer></script><script src="scripts/platform-flows.js?v=7" defer></script><script src="scripts/auth.js?v=4" defer></script><script src="scripts/main.js?v=13" defer></script><script src="scripts/community-trips.js?v=4" defer></script></head><body data-auth-required><a class="skip-link" href="#main-content">본문으로 바로가기</a><div data-site-header data-active="trips"></div><main class="page-main" id="main-content"><div class="shell publish-layout"><section><span class="page-eyebrow">SHARE YOUR ROUTE</span><h1 class="page-title">내 일정을 여행 가이드로</h1><p class="page-lead">공개 범위와 소개를 정하세요. 예약번호·여권정보·개인 메모는 공개 데이터에서 제외됩니다.</p><form class="publish-form" data-trip-publish-form><label>공개 제목<input required name="title" value="저녁이 좋은 교토 3박 4일"></label><label>한 줄 소개<textarea required name="summary">관광지를 많이 찍기보다 골목과 강변, 작은 식당에서 오래 머무는 일정입니다.</textarea></label><div class="publish-field-grid"><label>여행지<input required name="destination" value="교토"></label><label>기간<input required name="duration" value="3박 4일"></label><label>동행<input required name="companions" value="친구 2명"></label><label>태그<input required name="tags" value="골목, 저녁산책, 로컬맛집"></label></div><label>커버 이미지 경로<input required name="cover" value="assets/images/landmark-kyoto.jpg"></label><fieldset><legend>공개 방식</legend><label><input checked type="radio" name="visibility" value="PUBLIC"> 공개 발행 · 품질 검수 후 커뮤니티 노출</label><label><input type="radio" name="visibility" value="LINK"> 링크 공유 · 링크를 아는 사람만 보기</label></fieldset><label class="publish-consent"><input required type="checkbox"> 일정에 포함된 개인정보와 예약번호를 확인했고 공개하지 않겠습니다.</label><button class="ui-button primary" type="submit">공개 설정 저장</button></form></section><aside class="publish-side"><strong>공개 전 확인</strong><ul><li>장소·영업시간 출처</li><li>광고·협찬 표시</li><li>예약번호·여권·연락처 제거</li><li>본인이 촬영했거나 사용 가능한 사진</li><li>복사된 일정은 출처 일정 표시</li></ul></aside><div class="publish-result" data-publish-result hidden></div></div></main><div data-site-footer></div><div data-site-mobile-nav data-active="trips"></div></body></html>
